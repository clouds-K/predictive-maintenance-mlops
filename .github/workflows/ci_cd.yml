name: CI/CD Pipeline - Predictive Maintenance

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests Unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn xgboost mlflow matplotlib seaborn joblib pytest

      - name: Run preprocessing tests
        run: |
          pytest tests/test_preprocessing.py -v --tb=short

  lint:
    name: Qualité du Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install linters
        run: |
          pip install flake8 black

      - name: Check formatting with Black
        run: |
          black --check src/ tests/ api/ monitoring/ || true

      - name: Lint with Flake8
        run: |
          flake8 src/ tests/ api/ monitoring/ --max-line-length=100 --ignore=E501,W503,E203 || true

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t predictive-maintenance-api:latest .